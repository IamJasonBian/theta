<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>theta — ledger</title>

<!-- PWA / iOS home-screen -->
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<meta name="theme-color" content="#0f1115" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="theta" />
<meta name="description" content="theta ledger — record payments, debts, equity, and subscriptions" />

<style>
  :root {
    --bg: #0f1115; --panel: #161922; --line: #262b38;
    --fg: #e7e9ee; --mute: #8b93a7; --accent: #7aa2f7;
    --good: #9ece6a; --bad: #f7768e;
    /* safe-area insets for iPhone notch / home indicator */
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-l: env(safe-area-inset-left, 0px);
    --safe-r: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: contain; }
  body {
    margin: 0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg); color: var(--fg);
    padding: var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; letter-spacing: 0.02em; }
  header a { color: var(--mute); text-decoration: none; font-size: 12px; }
  header a:hover { color: var(--accent); }
  main { display: grid; grid-template-columns: 420px 1fr; gap: 0; min-height: calc(100vh - 49px); }
  section.form-panel { border-right: 1px solid var(--line); padding: 20px 24px; }
  section.ledger-panel { padding: 20px 24px; overflow: auto; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tabs button {
    flex: 1; background: transparent; color: var(--mute);
    border: 1px solid var(--line); padding: 10px 10px; cursor: pointer;
    font: inherit; border-radius: 6px; min-height: 44px;
  }
  .tabs button.active { background: var(--panel); color: var(--fg); border-color: var(--accent); }
  form { display: flex; flex-direction: column; gap: 12px; }
  label { display: flex; flex-direction: column; gap: 4px; color: var(--mute); font-size: 12px; }
  input, select {
    background: var(--panel); color: var(--fg); border: 1px solid var(--line);
    padding: 10px 12px; border-radius: 6px; font: inherit;
    /* 16px font-size prevents iOS Safari from zooming in on focus */
    font-size: 16px; min-height: 44px;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  button.submit {
    background: var(--accent); color: #0f1115; border: 0; padding: 14px 16px;
    border-radius: 6px; font: inherit; font-weight: 600; font-size: 16px;
    cursor: pointer; margin-top: 6px; min-height: 48px;
  }
  button.submit:hover { filter: brightness(1.1); }
  .status { font-size: 12px; margin-top: 8px; min-height: 16px; }
  .status.ok { color: var(--good); }
  .status.err { color: var(--bad); }
  h2 { font-size: 13px; color: var(--mute); text-transform: uppercase;
       letter-spacing: 0.08em; margin: 0 0 12px; }
  .kind-group { margin-bottom: 20px; }
  .kind-group h3 {
    font-size: 12px; color: var(--accent); margin: 0 0 6px; text-transform: uppercase;
  }
  details {
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 10px;
    background: var(--panel); margin-bottom: 6px;
  }
  details summary {
    cursor: pointer; display: flex; justify-content: space-between; gap: 12px;
  }
  details summary .id { color: var(--mute); font-size: 12px; }
  details summary .meta { color: var(--fg); }
  pre {
    margin: 8px 0 0; padding: 8px; background: #0b0d12;
    border-radius: 4px; overflow: auto; font-size: 12px;
  }
  .empty { color: var(--mute); font-style: italic; }
  .del {
    background: transparent; color: var(--bad); border: 1px solid var(--line);
    padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer;
    min-height: 32px;
  }
  .del:hover { border-color: var(--bad); }

  /* ---- view toggle (ledger | research) ---- */
  .view-tabs {
    display: flex; gap: 4px; margin-bottom: 14px;
    border-bottom: 1px solid var(--line); padding-bottom: 0;
  }
  .view-tabs button {
    background: transparent; color: var(--mute);
    border: none; border-bottom: 2px solid transparent;
    padding: 8px 14px 10px; cursor: pointer;
    font: inherit; font-size: 12px; letter-spacing: 0.06em;
    text-transform: uppercase; min-height: 36px;
  }
  .view-tabs button.active {
    color: var(--fg); border-bottom-color: var(--accent);
  }
  .view-tabs .refresh {
    margin-left: auto; color: var(--mute); font-size: 11px;
    border-bottom-color: transparent;
  }
  .view-tabs .refresh:hover { color: var(--accent); }

  /* ---- research gallery ---- */
  .research-meta {
    color: var(--mute); font-size: 12px; margin-bottom: 14px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .research-meta .pill {
    background: var(--panel); border: 1px solid var(--line);
    padding: 3px 8px; border-radius: 10px;
  }
  .research-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .artifact {
    border: 1px solid var(--line); background: var(--panel);
    border-radius: 6px; padding: 10px;
    display: flex; flex-direction: column; gap: 6px;
    text-decoration: none; color: var(--fg);
  }
  .artifact:hover { border-color: var(--accent); }
  .artifact .thumb {
    height: 120px; background: #0b0d12; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .artifact .thumb img {
    max-width: 100%; max-height: 100%;
    display: block;
  }
  .artifact .thumb .stub {
    color: var(--mute); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .artifact .thumb .kind-badge {
    position: absolute; top: 6px; right: 6px;
    color: var(--mute); font-size: 10px; letter-spacing: 0.06em;
    background: rgba(15, 17, 21, 0.65); padding: 2px 6px; border-radius: 3px;
  }
  .artifact .name {
    font-size: 12px; color: var(--fg); word-break: break-all;
  }
  .artifact .meta {
    font-size: 11px; color: var(--mute);
    display: flex; justify-content: space-between; gap: 8px;
  }
  .research-empty {
    color: var(--mute); font-style: italic; padding: 24px 0;
  }

  /* ---- run selector (horizontal date picker) ---- */
  .run-selector {
    display: flex; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; scrollbar-width: thin;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line);
  }
  .run-pill {
    flex: 0 0 auto;
    background: transparent; color: var(--mute);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 12px; cursor: pointer; font: inherit; font-size: 12px;
    display: flex; flex-direction: column; gap: 2px; align-items: flex-start;
    min-width: 96px; min-height: 44px;
    text-align: left;
  }
  .run-pill:hover { border-color: var(--accent); }
  .run-pill.active {
    background: var(--panel); color: var(--fg); border-color: var(--accent);
  }
  .run-pill .run-date {
    font-size: 12px; color: inherit; font-weight: 600;
    letter-spacing: 0.02em;
  }
  .run-pill .run-status {
    font-size: 9px; color: var(--mute);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .run-pill.active .run-status.upcoming { color: var(--accent); }
  .run-pill.active .run-status.ran      { color: var(--good); }
  .run-pill.active .run-status.missed   { color: var(--bad); }

  .artifact.placeholder { opacity: 0.85; }
  .artifact.placeholder .thumb {
    background: repeating-linear-gradient(
      135deg, #0b0d12 0 8px, #10131a 8px 16px
    );
  }
  .artifact.placeholder .thumb .stub {
    color: var(--mute); font-size: 10px;
  }

  /* ---- research sub-sections (per date) ---- */
  .research-section { margin-bottom: 22px; }
  .section-header {
    display: flex; align-items: baseline; gap: 10px;
    margin: 0 0 4px;
  }
  .section-title {
    font-size: 12px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600;
  }
  .section-count {
    font-size: 11px; color: var(--mute);
  }
  .section-hint {
    font-size: 11px; color: var(--mute);
    margin: 0 0 10px;
  }

  /* ---- mobile ---- */
  @media (max-width: 768px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
    }
    section.form-panel {
      border-right: none;
      border-bottom: 1px solid var(--line);
      padding: 16px;
    }
    section.ledger-panel { padding: 16px; }
    header { padding: 14px 16px; gap: 12px; }
    .tabs { gap: 6px; }
    .del { min-height: 36px; padding: 8px 14px; }
    /* larger summary tap target on touch devices */
    details { padding: 10px 12px; }
    details summary { padding: 4px 0; }
  }

  /* standalone PWA mode — slightly tighter header since iOS adds its own */
  @media (display-mode: standalone) {
    header { padding-top: calc(14px + var(--safe-t)); }
  }
</style>
</head>
<body>
<header>
  <h1>Ledger</h1>
  <a href="/docs">/docs</a>
  <a href="/openapi.json">openapi.json</a>
</header>

<main>
  <section class="form-panel">
    <div class="tabs">
      <button data-tab="payment" class="active">payment</button>
      <button data-tab="debt">debt</button>
      <button data-tab="equity">equity</button>
      <button data-tab="sub">sub</button>
    </div>

    <form id="form" autocomplete="off">
      <label>id <input name="id" placeholder="leave blank → 'default' slot"
             autocapitalize="none" autocorrect="off" spellcheck="false" /></label>

      <!-- payment -->
      <div data-fields="payment">
        <label>payee <input name="payee" placeholder="Whole Foods" autocapitalize="words" /></label>
        <label>amount <input name="amount" placeholder="184.32"
               inputmode="decimal" autocomplete="off" /></label>
        <label>card_id <input name="card_id" placeholder="blank → default card"
               autocapitalize="none" autocorrect="off" spellcheck="false" /></label>
        <label>txn_date <input name="txn_date" type="date" /></label>
        <label>expense_account <input name="expense_account" placeholder="Expenses:Groceries"
               autocapitalize="none" autocorrect="off" spellcheck="false" /></label>
      </div>

      <!-- debt -->
      <div data-fields="debt" hidden>
        <label>creditor <input name="creditor" placeholder="IRS" autocapitalize="words" /></label>
        <label>principal <input name="principal" placeholder="1500.00"
               inputmode="decimal" autocomplete="off" /></label>
        <label>due_date <input name="due_date" type="date" /></label>
        <label>apr <input name="apr" placeholder="0.06"
               inputmode="decimal" autocomplete="off" /></label>
        <label>offset_account <input name="offset_account" placeholder="Expenses:Taxes"
               autocapitalize="none" autocorrect="off" spellcheck="false" /></label>
      </div>

      <!-- equity -->
      <div data-fields="equity" hidden>
        <label>source <input name="source" placeholder="bonus"
               autocapitalize="none" /></label>
        <label>amount <input name="amount_eq" placeholder="5000.00"
               inputmode="decimal" autocomplete="off" /></label>
        <label>received_on <input name="received_on" type="date" /></label>
        <label>target_bucket <input name="target_bucket" placeholder="sp500 (optional)"
               autocapitalize="none" autocorrect="off" spellcheck="false" /></label>
      </div>

      <!-- sub -->
      <div data-fields="sub" hidden>
        <label>service <input name="service" placeholder="netflix"
               autocapitalize="none" autocorrect="off" spellcheck="false" /></label>
        <label>amount <input name="amount_sub" placeholder="15.99"
               inputmode="decimal" autocomplete="off" /></label>
        <label>frequency
          <select name="frequency">
            <option>monthly</option><option>weekly</option><option>yearly</option>
          </select>
        </label>
        <label>next_charge_date <input name="next_charge_date" type="date" /></label>
        <label>funding_card_id <input name="funding_card_id" placeholder="blank → default card"
               autocapitalize="none" autocorrect="off" spellcheck="false" /></label>
        <label>horizon <input name="horizon" type="number" value="12"
               inputmode="numeric" /></label>
      </div>

      <button type="submit" class="submit">PUT</button>
      <div id="status" class="status"></div>
    </form>
  </section>

  <section class="ledger-panel">
    <div class="view-tabs">
      <button data-view="ledger" class="active">ledger</button>
      <button data-view="research">research</button>
      <button class="refresh" id="view-refresh" title="re-fetch current view">refresh</button>
    </div>

    <div id="ledger-view">
      <div id="ledger"></div>
    </div>

    <div id="research-view" hidden>
      <div id="research-meta" class="research-meta"></div>
      <div id="run-selector" class="run-selector"></div>
      <div id="run-artifacts"></div>
    </div>
  </section>
</main>

<script>
const $ = sel => document.querySelector(sel);
const $$ = sel => [...document.querySelectorAll(sel)];

let currentTab = 'payment';
// Mirror of /ledger fetched by refresh(). Used for the "id already exists"
// check before a PUT so we don't silently clobber an entry the user can
// actually see on the right-hand panel.
let latestLedger = { payment: {}, debt: {}, equity: {}, sub: {} };

// Short, unique-enough ids so every fresh form load gets its own slot.
// Format: "<kind>-<date>-<rand>", e.g. "debt-20260409-k4p2m".
function genId(kind) {
  const now = new Date();
  const ymd = now.toISOString().slice(0, 10).replaceAll('-', '');
  const rand = Math.random().toString(36).slice(2, 7);
  return `${kind}-${ymd}-${rand}`;
}

// Fill the id field with a fresh auto-generated id. Also stamp a flag so
// we can tell "user hasn't touched it" vs. "user typed something" later.
function prefillId() {
  const el = $('#form').elements['id'];
  el.value = genId(currentTab);
  el.dataset.autogen = '1';
}

// tab switch
$$('.tabs button').forEach(b => b.addEventListener('click', () => {
  currentTab = b.dataset.tab;
  $$('.tabs button').forEach(x => x.classList.toggle('active', x === b));
  $$('[data-fields]').forEach(g => g.hidden = g.dataset.fields !== currentTab);
  // Regenerate the id on tab switch so the kind prefix matches the new
  // tab — but only if the user hasn't typed their own id manually.
  const idEl = $('#form').elements['id'];
  if (idEl.dataset.autogen === '1') prefillId();
}));

// Once the user types in the id field themselves, stop auto-regenerating
// it — that's them declaring "I want to upsert this specific id".
$('#form').elements['id'].addEventListener('input', (e) => {
  e.target.dataset.autogen = '';
});

// build PUT body from current form
function buildBody() {
  const f = $('#form');
  const v = name => f.elements[name]?.value.trim() || undefined;
  if (currentTab === 'payment') {
    return {
      payee: v('payee'),
      amount: v('amount'),
      // Blank → 'default' slot. The API guarantees a synthetic "default"
      // card exists in the wallet so this resolves without requiring
      // the user to configure a wallet first.
      card_id: v('card_id') || 'default',
      txn_date: v('txn_date'),
      expense_account: v('expense_account') || 'Expenses:Uncategorized',
    };
  }
  if (currentTab === 'debt') {
    return {
      creditor: v('creditor'),
      principal: v('principal'),
      due_date: v('due_date'),
      apr: v('apr') || '0',
      offset_account: v('offset_account') || 'Expenses:Uncategorized',
    };
  }
  if (currentTab === 'equity') {
    return {
      source: v('source'),
      amount: v('amount_eq'),
      received_on: v('received_on'),
      target_bucket: v('target_bucket') || null,
    };
  }
  if (currentTab === 'sub') {
    return {
      service: v('service'),
      amount: v('amount_sub'),
      frequency: v('frequency'),
      next_charge_date: v('next_charge_date'),
      // Same 'default' fallback as payment — blank funding card resolves
      // to the synthetic "default" debit card.
      funding_card_id: v('funding_card_id') || 'default',
      horizon: parseInt(v('horizon') || '12', 10),
    };
  }
}

$('#form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const idEl = $('#form').elements['id'];
  let id = idEl.value.trim();
  const isDefault = !id;          // user cleared the field → quick-entry slot
  if (isDefault) id = 'default';

  // Collision check: if this id already exists under this kind and the
  // user typed it manually (i.e. autogen flag is off) AND it isn't the
  // quick-entry 'default' slot (which is designed to be overwritten),
  // confirm before we silently clobber the prior entry. Auto-generated
  // ids skip the check because they're designed to be unique — any
  // collision there is astronomically rare.
  const isAutogen = idEl.dataset.autogen === '1';
  if (!isAutogen && !isDefault
      && latestLedger[currentTab] && latestLedger[currentTab][id]) {
    const ok = confirm(
      `${currentTab}/${id} already exists.\n\nPUT will overwrite it. Continue?`
    );
    if (!ok) return setStatus('cancelled', false);
  }

  const body = buildBody();
  const res = await fetch(`/ledger/${currentTab}/${encodeURIComponent(id)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) return setStatus(`${res.status}: ${data.error || 'error'}`, false);
  setStatus(`upserted ${currentTab}/${id}`, true);

  // Reset the form fields for the current tab so the next submit is a
  // clean slate. We can't just call form.reset() because that would
  // clobber the id with the HTML default (empty), and also reset the
  // frequency <select> which has a meaningful default we want to keep.
  resetFieldsForTab(currentTab);
  prefillId();

  refresh();
});

// Clear the visible fields for the given tab. Shared fields (id) are
// handled separately by prefillId(). The frequency select keeps its
// current value rather than reverting, so repeat sub entries feel fast.
function resetFieldsForTab(tab) {
  const f = $('#form');
  const clear = (name) => { if (f.elements[name]) f.elements[name].value = ''; };
  if (tab === 'payment') {
    ['payee','amount','card_id','txn_date','expense_account'].forEach(clear);
  } else if (tab === 'debt') {
    ['creditor','principal','due_date','apr','offset_account'].forEach(clear);
  } else if (tab === 'equity') {
    ['source','amount_eq','received_on','target_bucket'].forEach(clear);
  } else if (tab === 'sub') {
    ['service','amount_sub','next_charge_date','funding_card_id'].forEach(clear);
    // leave frequency + horizon at whatever the user picked — likely
    // reused across multiple subs being entered in a row
  }
}

function setStatus(msg, ok) {
  const el = $('#status');
  el.textContent = msg;
  el.className = 'status ' + (ok ? 'ok' : 'err');
}

async function refresh() {
  const res = await fetch('/ledger');
  const data = await res.json();
  latestLedger = data;  // cache for collision-check in submit handler
  const root = $('#ledger');
  root.innerHTML = '';
  for (const kind of ['payment', 'debt', 'equity', 'sub']) {
    const entries = data[kind] || {};
    const ids = Object.keys(entries);
    const group = document.createElement('div');
    group.className = 'kind-group';
    group.innerHTML = `<h3>${kind} (${ids.length})</h3>`;
    if (ids.length === 0) {
      const p = document.createElement('div');
      p.className = 'empty';
      p.textContent = '(none)';
      group.appendChild(p);
    }
    for (const id of ids) {
      const entry = entries[id];
      const d = document.createElement('details');
      const meta = summarize(kind, entry);
      d.innerHTML = `
        <summary>
          <span class="id">${kind}/${id}</span>
          <span class="meta">${meta}</span>
          <button class="del" data-kind="${kind}" data-id="${id}">delete</button>
        </summary>
        <pre>${escapeHtml(JSON.stringify(entry, null, 2))}</pre>
      `;
      group.appendChild(d);
    }
    root.appendChild(group);
  }
  $$('.del').forEach(b => b.addEventListener('click', async (e) => {
    e.stopPropagation();
    await fetch(`/ledger/${b.dataset.kind}/${encodeURIComponent(b.dataset.id)}`, { method: 'DELETE' });
    refresh();
  }));
}

function summarize(kind, entry) {
  if (kind === 'payment') return `$${entry.payment?.amount} → ${entry.payment?.payee}`;
  if (kind === 'debt') return `$${entry.debt?.principal} → ${entry.debt?.creditor}`;
  if (kind === 'equity') return `$${entry.equity?.amount} from ${entry.equity?.source}`;
  if (kind === 'sub') return `$${entry.subscription?.amount}/${entry.subscription?.frequency} ${entry.subscription?.service}`;
  return '';
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

// ---- view toggle (ledger | research) ----

let currentView = 'ledger';

$$('.view-tabs button[data-view]').forEach(b => b.addEventListener('click', () => {
  currentView = b.dataset.view;
  $$('.view-tabs button[data-view]').forEach(x =>
    x.classList.toggle('active', x === b));
  $('#ledger-view').hidden  = currentView !== 'ledger';
  $('#research-view').hidden = currentView !== 'research';
  if (currentView === 'research') renderResearchRuns();
}));

$('#view-refresh').addEventListener('click', () => {
  if (currentView === 'research') renderResearchRuns();
  else refresh();
});

// ---- research artifact gallery ----

function fmtAgo(iso) {
  if (!iso) return '';
  const then = new Date(iso).getTime();
  if (Number.isNaN(then)) return iso;
  const sec = Math.round((Date.now() - then) / 1000);
  const abs = Math.abs(sec);
  const dir = sec >= 0 ? 'ago' : 'from now';
  if (abs < 60) return `${abs}s ${dir}`;
  if (abs < 3600) return `${Math.round(abs / 60)}m ${dir}`;
  if (abs < 86400) return `${Math.round(abs / 3600)}h ${dir}`;
  return `${Math.round(abs / 86400)}d ${dir}`;
}

// Each research run is partitioned into sub-research sections. Sections
// are ordered top→bottom in the grouped view below the date picker.
const RESEARCH_SECTIONS = [
  {
    slug: 'health',
    title: 'Financial health',
    hint:  'snapshots of where the ledger stands right now',
    components: [
      { slug: 'fscore',        blurb: 'Piotroski-style 0..9 score' },

// Flattened count for header pill.
const RESEARCH_COMPONENT_COUNT = RESEARCH_SECTIONS.reduce(
  (n, s) => n + s.components.length, 0
);

// Weekly schedule anchor — Mondays 09:00 UTC. Generate the most-recent
// N past Mondays plus the next upcoming one. All dates are UTC so the
// tiles line up with the Render cron, which runs in UTC.
function mostRecentMondayUTC(from = new Date()) {
  const d = new Date(Date.UTC(
    from.getUTCFullYear(), from.getUTCMonth(), from.getUTCDate(), 9, 0, 0, 0
  ));
  // 0 = Sun, 1 = Mon, ... 6 = Sat
  const dow = d.getUTCDay();
  const back = (dow + 6) % 7;  // days since last Monday
  d.setUTCDate(d.getUTCDate() - back);
  return d;
}

function researchRunDates({ past = 4, future = 1 } = {}) {
  const anchor = mostRecentMondayUTC();
  const out = [];
  for (let i = future; i > 0; i--) {
    const d = new Date(anchor);
    d.setUTCDate(d.getUTCDate() + 7 * i);
    out.push(d);
  }
  for (let i = 0; i <= past; i++) {
    const d = new Date(anchor);
    d.setUTCDate(d.getUTCDate() - 7 * i);
    out.push(d);
  }
  return out;
}

function runStatus(date) {
  const now = Date.now();
  const t = date.getTime();
  if (t > now) return 'upcoming';
  // anything in the last 7 days after the scheduled time is the "latest run"
  if (now - t < 7 * 24 * 3600 * 1000) return 'ran';
  return 'ran';  // historical — treat all past runs as "ran" in this stub view
}

function fmtRunDate(d) {
  // e.g. "Mon Apr 20 2026"
  const opts = { weekday: 'short', month: 'short', day: 'numeric',
                 year: 'numeric', timeZone: 'UTC' };
  return d.toLocaleDateString('en-US', opts);
}

// selected run date (ISO "YYYY-MM-DD"). Defaults to the most-recent
// past run — the one the user is most likely to want to look at.
let currentRunIso = null;

function renderRunSelector() {
  const selector = $('#run-selector');
  selector.innerHTML = '';

  const dates = researchRunDates();
  // Most-recent-past run becomes the default selection if nothing is picked.
  const now = Date.now();
  if (!currentRunIso) {
    const past = dates.filter(d => d.getTime() <= now);
    const defaultD = past.length ? past[0] : dates[0];
    currentRunIso = defaultD.toISOString().slice(0, 10);
  }

  for (const d of dates) {
    const iso = d.toISOString().slice(0, 10);
    const status = runStatus(d);
    const btn = document.createElement('button');
    btn.className = 'run-pill' + (iso === currentRunIso ? ' active' : '');
    btn.dataset.iso = iso;
    btn.innerHTML = `
      <span class="run-date">${fmtRunDate(d)}</span>
      <span class="run-status ${status}">${status} · ${fmtAgo(d.toISOString())}</span>`;
    btn.addEventListener('click', () => {
      currentRunIso = iso;
      $$('.run-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.iso === iso));
      renderRunArtifacts();
    });
    selector.appendChild(btn);
  }
}

function renderRunArtifacts() {
  const root = $('#run-artifacts');
  root.innerHTML = '';
  for (const section of RESEARCH_SECTIONS) {
    const sec = document.createElement('section');
    sec.className = 'research-section';
    sec.innerHTML = `
      <div class="section-header">
        <span class="section-title">${section.title}</span>
        <span class="section-count">${section.components.length}</span>
      </div>
      <div class="section-hint">${section.hint}</div>
      <div class="research-grid"></div>`;

    const grid = sec.querySelector('.research-grid');
    for (const c of section.components) {
      const card = document.createElement('div');
      card.className = 'artifact placeholder';
      card.innerHTML = `
        <div class="thumb">
          <div class="stub">${c.slug}</div>
          <span class="kind-badge">${currentRunIso}</span>
        </div>
        <div class="name">${c.slug}</div>
        <div class="meta">
          <span>${c.blurb}</span>
          <span>${section.slug}</span>
        </div>`;
      grid.appendChild(card);
    }
    root.appendChild(sec);
  }
}

function renderResearchRuns() {
  const meta = $('#research-meta');
  meta.innerHTML = [
    `<span class="pill">schedule: Mon 09:00 UTC</span>`,
    `<span class="pill">${RESEARCH_SECTIONS.length} sections · ${RESEARCH_COMPONENT_COUNT} components / run</span>`,
    `<span class="pill">placeholders · artifacts wiring pending</span>`,
  ].join('');
  renderRunSelector();
  renderRunArtifacts();
}
