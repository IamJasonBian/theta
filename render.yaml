# Render Blueprint — https://render.com/docs/blueprint-spec
#
# One-service deploy of the ledger API + frontend + Swagger UI. Connect the
# repo in the Render dashboard (or via the Render API with a token) and
# Render will auto-apply this file on every push to the target branch.
#
# NOTE: the in-memory LedgerStore does NOT survive restarts or zero-downtime
# deploys. If you need persistence, add a Render Redis or Postgres resource
# here and swap LedgerStore for a backed implementation before going live.

services:
  - type: web
    name: theta
    runtime: docker
    repo: https://github.com/IamJasonBian/theta
    branch: main
    dockerfilePath: ./Dockerfile
    plan: starter          # $7/mo, always-on. Use `free` for idle-sleep tier.
    region: oregon
    healthCheckPath: /healthz
    # Persistent disk for the SQLite ledger database. 1GB is ~$0.25/mo on
    # top of the starter plan. Entries PUT into /ledger survive deploys,
    # restarts, and instance recycles as long as this disk stays attached.
    # Note: adding a disk forces non-zero-downtime deploys (detach/reattach).
    disk:
      name: theta-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: LEDGER_API_VERBOSE
        value: "0"
      # Points the SqliteLedgerStore at the mounted disk. Unset → in-memory.
      - key: LEDGER_DB_PATH
        value: /data/theta.sqlite
      # Render injects $PORT automatically; api.py reads it.
      # Add WALLET_PATH here if/when we ship a bundled wallet file.
    autoDeploy: true

  # Long-running worker that polls the API above via LedgerEventHandler,
  # maintains rolling state, and fires alert callbacks. Shares the same
  # Docker image — only the entrypoint script differs. Reads its knobs
  # from the LEDGER_* env vars below; defaults in scripts/run_handler.sh
  # mirror these so local runs behave the same as Render.
  - type: worker
    name: theta-handler
    runtime: docker
    repo: https://github.com/IamJasonBian/theta
    branch: main
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    dockerCommand: bash operators/scripts/run_handler.sh
    envVars:
      - key: LEDGER_BASE_URL
        # Point at the sibling web service. fromService binds at deploy
        # time so the URL stays correct across Render env renames.
        fromService:
          type: web
          name: theta
          property: hostport
      - key: LEDGER_TIMEOUT
        value: "10"
      - key: LEDGER_INTERVAL
        value: "5.0"
      - key: LEDGER_MAX_BACKOFF
        value: "60.0"
      - key: LEDGER_ALERT_THRESHOLD
        value: "3"
      - key: LEDGER_SKIP_INITIAL_SNAPSHOT
        value: "0"
    autoDeploy: true
